name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Quartz
        run: |
          mkdir -p quartz-site
          cd quartz-site
          npm init -y
          npm install @jackyzha0/quartz
          npx quartz create --no-confirm

      - name: Sync content
        run: |
          # Copy content to quartz-site/content
          mkdir -p quartz-site/content
          cp -r Papers quartz-site/content/
          cp -r Topics quartz-site/content/
          cp -r Ideas quartz-site/content/
          cp -r DomainMaps quartz-site/content/
          cp -r Meetings quartz-site/content/
          cp -r Projects quartz-site/content/
          cp -r Reports quartz-site/content/
          cp index.md quartz-site/content/

          # Update quartz.config.ts
          cat > quartz-site/quartz.config.ts << 'CONFIGEOF'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"

          const config: QuartzConfig = {
            configuration: {
              pageTitle: "DeepRead",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              baseUrl: "kendrick-stein.github.io/MCISLAB_DeepRead",
              ignorePatterns: ["Templates/**", ".obsidian/**", "Workbench/**"],
              defaultDateType: "published",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: {
                  header: "Schibsted Grotesk",
                  body: "Source Sans Pro",
                  code: "IBM Plex Mono",
                },
                colors: {
                  lightMode: {
                    light: "#faf8f8",
                    lightgray: "#e5e5e5",
                    gray: "#b8b8b8",
                    darkgray: "#4e4e4e",
                    dark: "#2b2b2b",
                    secondary: "#284b63",
                    tertiary: "#84a59d",
                  },
                  darkMode: {
                    light: "#161618",
                    lightgray: "#393639",
                    gray: "#646464",
                    darkgray: "#d4d4d4",
                    dark: "#ebebec",
                    secondary: "#7b97aa",
                    tertiary: "#84a59d",
                  },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({ priority: ["frontmatter", "filesystem"] }),
                Plugin.SyntaxHighlighting({ theme: { light: "github-light", dark: "github-dark" } }),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlEmbed: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
                Plugin.Latex({ renderEngine: "katex" }),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(),
                Plugin.ComponentResources(),
                Plugin.ContentPage(),
                Plugin.FolderPage(),
                Plugin.TagPage(),
                Plugin.ContentIndex({ enableSiteMap: true, enableRSS: true }),
                Plugin.Assets(),
                Plugin.Static(),
                Plugin.NotFoundPage(),
              ],
            },
          }
          export default config
          CONFIGEOF

      - name: Build Quartz
        working-directory: ./quartz-site
        run: npx quartz build --directory content --output public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./quartz-site/public

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4