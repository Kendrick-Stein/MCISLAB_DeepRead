name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Sync content
        run: |
          mkdir -p website/content
          cp -r Papers website/content/
          cp -r Topics website/content/
          cp -r Ideas website/content/
          cp -r DomainMaps website/content/
          cp -r Meetings website/content/
          cp -r Projects website/content/
          cp -r Reports website/content/
          cp index.md website/content/
          cp README.md website/content/

      - name: Install dependencies
        working-directory: ./website
        run: npm install

      - name: Build Quartz
        working-directory: ./website
        run: npx quartz build --directory content --output public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4